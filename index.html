<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>南汇水蜜桃合作联社产业地图 v18</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="header">
  <img src="img/asset-01.png" alt="浦东新区南汇水蜜桃产业地图">
</div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <div class="info-panel-header">
    <div class="info-panel-title" id="infoPanelTitle">合作社信息</div>
    <button class="info-panel-close" onclick="closeInfoPanel()">×</button>
  </div>
  <div class="info-panel-body" id="infoPanelBody"></div>
</div>

<!-- Map area: just map (no sidebar) -->
<div class="map-area">
  <!-- Map -->
  <div class="map-wrapper">
    <div id="map"></div>
    <!-- Suyuan image overlay inside map -->
    <img class="map-suyuan-overlay" src="img/asset-02.jpg" alt="申农链溯源信息">
    <div class="map-legend">
      <div class="legend-title">🗺️ 图例</div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#F4A7A7;border-color:#E07070;"></div>
        <span>种植核心区</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#FCE0E0;border-color:#E0AAAA;"></div>
        <span>种植主产区</span>
      </div>
      <div class="legend-item" style="margin-top:5px;padding-top:5px;border-top:1px solid #F0E0D0;">
        <div class="legend-line" style="background:#5B8C5A;border:none;height:2px;outline:1px solid #5B8C5A;"></div>
        <span style="color:#5B8C5A;font-weight:600;">地理标志保护范围</span>
      </div>
      <div class="legend-item">
        <img src="img/asset-03.png" class="legend-dot" alt="">
        <span>水蜜桃合作社</span>
      </div>
    </div>
  </div>
</div>

<!-- Bottom section: dir toggle + search + filter + list -->
<div class="bottom-section dir-section-collapsed" id="bottomSection">
  <div class="dir-header" style="cursor:pointer;user-select:none;" onclick="toggleDirectory()">
    📋 浦东主要水蜜桃合作社名录 <span class="count" id="resultCount">（共49家）</span>
    <button class="dir-toggle-btn" id="dirToggleBtn" onclick="event.stopPropagation();toggleDirectory()">展开 ▼</button>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索合作社名称、所属镇、法人代表..." oninput="filterDirectory()">
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-town="all" onclick="filterByTown('all')">全部<span class="filter-count">49</span></button>
    <button class="filter-btn" data-town="大团镇" onclick="filterByTown('大团镇')">大团镇<span class="filter-count">13</span></button>
<button class="filter-btn" data-town="航头镇" onclick="filterByTown('航头镇')">航头镇<span class="filter-count">7</span></button>
<button class="filter-btn" data-town="新场镇" onclick="filterByTown('新场镇')">新场镇<span class="filter-count">6</span></button>
<button class="filter-btn" data-town="川沙新镇" onclick="filterByTown('川沙新镇')">川沙新镇<span class="filter-count">4</span></button>
<button class="filter-btn" data-town="惠南镇" onclick="filterByTown('惠南镇')">惠南镇<span class="filter-count">4</span></button>
<button class="filter-btn" data-town="祝桥镇" onclick="filterByTown('祝桥镇')">祝桥镇<span class="filter-count">3</span></button>
<button class="filter-btn" data-town="书院镇" onclick="filterByTown('书院镇')">书院镇<span class="filter-count">3</span></button>
<button class="filter-btn" data-town="万祥镇" onclick="filterByTown('万祥镇')">万祥镇<span class="filter-count">3</span></button>
<button class="filter-btn" data-town="合庆镇" onclick="filterByTown('合庆镇')">合庆镇<span class="filter-count">3</span></button>
<button class="filter-btn" data-town="老港镇" onclick="filterByTown('老港镇')">老港镇<span class="filter-count">2</span></button>
<button class="filter-btn" data-town="周浦镇" onclick="filterByTown('周浦镇')">周浦镇<span class="filter-count">1</span></button>
  </div>

  <div class="dir-table-header">
    <div class="dir-col dir-name">主体名称</div>
    <div class="dir-col dir-person">法人代表</div>
    <div class="dir-col dir-phone">联系方式</div>
    <div class="dir-col dir-area">面积</div>
  </div>

  <div class="directory" id="directory">
    <div id="dirList"></div>
    <div class="no-results" id="noResults" style="display:none;">未找到匹配的合作社，请尝试其他搜索条件</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
</body>
</html>
